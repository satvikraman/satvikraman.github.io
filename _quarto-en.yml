project:
  type: website
  output-dir: docs
  preview: 
    browser: true
    port: 5555
    watch-inputs: true
    navigate: true
  render:
    - "*-en.qmd"

website:
  title: "Satvik Raman"
  description: "My personal website to showcase my interests, projects, and achievements."
  site-url: "https://satvikraman.github.io"
  repo-url: "https://github.com/satvikraman/satvikraman.github.io"
  search: true
  back-to-top-navigation: true

  twitter-card:
    image: "/assets/profile/twitter_card.png"
    card-style: summary_large_image
    creator: "@satvikraman"
    site: "@satvikraman"
  
  open-graph: 
    image: "/assets/profile/twitter_card.png"
    locale: en_US  

  page-footer:
    left: |
      <span>{{< fa brands creative-commons >}} {{< var years >}} Satvik Raman · [CC BY 4.0](https://creativecommons.org/licenses/by/4.0/)</span>
    right: |
      <span>Built with [Quarto](https://quarto.org/) · [{{< fa brands github >}} Source]({{< var github-url >}})</span>

  navbar:
    pinned: true
    left:
      - text: "About"
        href: index-en.html
      - text: "Projects"
        file: projects/index-en.html

    right:
      - text: "{{< iconify bi globe2 size=1.1em title='Languages' >}}"
        aria-label: Languages
        menu:
          - text: English
            href: ../index-en.html
          - text: Deutsch
            href: ../index-de.html
      - text: "{{< iconify bi envelope size=1.1em title='E-mail' >}}"
        href: "mailto:satvikraman11@gmail.com"
      - text: "{{< iconify bi github size=1.1em title='GitHub' >}}"
        href: https://github.com/satvikraman
        rel: me
      - text: "{{< iconify bi linkedin size=1.1em title='LinkedIn' >}}"
        href: https://www.linkedin.com/in/satvik-raman-bb3841407
        rel: me

format:
  html:
    theme:
      - cosmo
      - /assets/theme.scss
    css: /assets/styles.css

lang: en-US
language:
  ui: en
