project:
  type: website
  output-dir: docs
  preview: 
    browser: true
    port: 5555
    watch-inputs: true
    navigate: true
  render:
    - "index.qmd"

profile:
  default: def
  group: 
    - [def,en,de]

website:
  title: "Satvik Raman"
  description: "Personal portfolio showcasing my interests, projects, and achievements."
  site-url: "https://satvikraman.github.io"
  repo-url: "https://github.com/satvikraman/satvikraman.github.io"
  back-to-top-navigation: true

  twitter-card:
    image: "/assets/profile/twitter_card.png"
    card-style: summary_large_image
    creator: "@satvikraman"
    site: "@satvikraman"
  
  open-graph: 
    image: "/assets/profile/twitter_card.png"
    locale: en_US  

  page-footer:
    left: |
      <span>{{< fa brands creative-commons >}} {{< var years >}} Satvik Raman · [CC BY 4.0](https://creativecommons.org/licenses/by/4.0/)</span>
    right: |
      <span>Built with [Quarto](https://quarto.org/) · [{{< fa brands github >}} Source]({{< var github-url >}})</span>

format:
  html:
    theme:
      - cosmo
      - /assets/theme.scss
    css: /assets/styles.css

lang: en-US
language:
  ui: en
